services:
  - type: web
    name: ahmad-chatbot-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
